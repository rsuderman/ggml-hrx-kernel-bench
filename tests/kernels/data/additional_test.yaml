ops:
  QUANTIZE:
    - dtype:
        type_dst: q8_1_x4
        type_src: f32
        type_weight: f32
      cases:
        - eps: 0.0
          ne: [3072, 1, 1, 1]
    - dtype:
        type_dst: q8_1
        type_src: f32
      cases:
        - ne: [256, 1, 1, 1]

  ROPE_SCALE:
    - dtype:
        type: f32
      cases:
        - af: 1.0
          ef: 0.0
          ff: 1
          fs: 1.0
          inplace: 0
          mode: 2
          n_ctx: 512
          n_dims: 96
          ne_a: [128, 24, 1, 1]
          v: 0

  SET_ROWS:
    - dtype:
        type_dst: f16
        type_idx: i64
        type_src: f32
      cases:
        - ne: [128, 4, 1, 1]
          nr23: [1, 1]
          r: 2
          v: 0

  FLASH_ATTN_EXT:
    - dtype:
        type_KV: f16
      cases:
        # Intended target:
        # softmax_kqv_f32_f16_decode_kv256_d128_h24_hkv8_wg64_rows2
        - hsk: 128
          hsv: 128
          kv: 256
          logit_softcap: 0.0
          mask: 1
          max_bias: 0.0
          nb: 1
          nh: 24
          nr23: [4, 1]
          permute: [0, 1, 2, 3]
          prec: f32
          sinks: 0

        # Intended target:
        # softmax_kqv_f32_f16_decode_kv512_d128_h24_hkv8_wg256_rows128
        - hsk: 128
          hsv: 128
          kv: 512
          logit_softcap: 0.0
          mask: 1
          max_bias: 0.0
          nb: 1
          nh: 24
          nr23: [4, 1]
          permute: [0, 1, 2, 3]
          prec: f32
          sinks: 0

        # Intended target:
        # softmax_kqv_f32_f16_decode_kv768_d128_h24_hkv8_wg256_rows128
        - hsk: 128
          hsv: 128
          kv: 768
          logit_softcap: 0.0
          mask: 1
          max_bias: 0.0
          nb: 1
          nh: 24
          nr23: [4, 1]
          permute: [0, 1, 2, 3]
          prec: f32
          sinks: 0

  GET_ROWS:
    - dtype:
        type: f32
      cases:
        - moe_weights: 1
          nexperts: 128
          nselected: 8
          ntokens: 16
          src0_token_stride: 128
          idx_token_stride: 8
          dst_token_stride: 8
